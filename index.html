<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユニスタRE Wiki チャットボット</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c8922a;
      --gold-light: #e8c06a;
      --gold-dim: #b28c39;
      --bg: #1a1814;
      --bg2: #231f1a;
      --bg3: #2e2820;
      --border: #3a3228;
      --text: #e8e0d0;
      --text-dim: #9a8e7a;
      --accent: #e88c00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    /* チャットエリア */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ウェルカムメッセージ */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .welcome-icon {
      font-size: 2.5em;
      margin-bottom: 16px;
    }
    .welcome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4em;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .welcome p { font-size: 0.85em; line-height: 1.7; }
    .welcome-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .example-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78em;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
    }
    .example-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--bg2); }

    /* メッセージ */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 800px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .msg.assistant { margin-right: auto; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--gold); color: #1a1814; }
    .msg.assistant .msg-avatar { background: var(--bg3); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88em;
      line-height: 1.75;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--gold);
      color: #1a1814;
      font-weight: 500;
      border-radius: 8px 2px 8px 8px;
    }
    .msg.assistant .msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 2px 8px 8px 8px;
    }

    /* ローディング */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* 入力エリア */
    #input-area {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88em;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { outline: none; border-color: var(--gold); }
    #user-input::placeholder { color: var(--text-dim); }
    #send-btn {
      background: var(--gold);
      color: #1a1814;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* エラー */
    .error-msg {
      background: #3a1a1a;
      border: 1px solid #7a3030;
      color: #e08080;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82em;
    }

    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #chat-area { padding: 14px; }
      #input-area { padding: 10px 14px; }
      .msg { max-width: 100%; }
    }
  </style>
</head>

チュートリアル直後の動きについて
チュートリアル直後の育成では、JRAレース、マーケット、サークルといった未開放の要素を解放できるよう育成を進めていきたい。
JRAレースは
ユニスタOP
の勝利で、マーケット、サークルは
レーティングpt1600
に到達で開放することができる。
ツマミスキーを入厩させる

チュートリアル後に未入厩馬として存在するツマミスキーは、育てればJRAレースのOP、うまくいけばG3を勝てる馬になっている。
馬一覧から、未入厩を選択し、ツマミスキーを選択して、入厩させよう。
入厩後の動き

まずはレースに出走できる状態にするため調教を進めよう。
調教からツマミスキーを選ぶことで調教が可能になっている。
オート調教を活用すれば、カレンダーをめくるだけで、調教を進めることができるので
オート調教
に設定しよう。この際、設定は
「お任せ(アイテム無し）」
で問題ない
ユニスタレースに出走して勝ち負けできるステータスになる3歳9月ごろまでは調教をひらすら進めよう。
ユニスタレースに出走させよう

3歳9月まで調教を進めることができたら、ユニスタレースに出走させよう。
レースからNPCレースエントリー、ツマミスキーを選択することでレース画面に移動できる。
レース画面に移動したら、
ユニスタ:未勝利からユニスタ:OP
までレースに出走させよう。
ユニスタOPに勝利することができたら、JRAレースが解放される。
Point!
・出走の際は適正体重であることを確認しよう
・必ずオススメマークのついているレースに出走させよう
Point!
この過程でレーティングpt400に到達できるため、
友達招待キャンペーンの条件を満たすことができる。
報酬として
5,000USPがゲットできる
のでぜひ活用しよう！

成長限界まで調教しよう

JRAレースを解放したら、JRAのOPレース勝利に向けて、再度調教を進めていこう。
4歳4月1週目まではオート調教で問題ない。
4歳4月1週目になったら、調教画面から調教の状況を確認しよう。
90%など調教が進み切っていない、ステータスがある場合は、
100%を目指して手動で調教を進めていこう。特に
スピードと勝負根性
は100%に近い状態にしたい。
調教アイテム選択欄でアイテムを選択すれば調教効率を上げるアイテムを使用可能になっている。
JRAレースに挑戦しよう。

成長限界近くまで育成が完了したら、
JRAレース（緑背景のレース）
に出走させよう
スピードとスタミナが100%に近い状態まで育成できていれば、

サークルとマーケット

必ず加入

成長限界と成長ピーク

ユニスタREでは競走馬ごとに
能力値と成長速度
が設定されている。
それに合わせて、時期ごとの
成長限界
と
その馬の持つ能力の最大値まで育てることのできる
成長ピーク時期
が設定されている。
各競走馬の能力値については、調教画面から確認であり、
・緑色のグラフは
最大の能力値
を
・青色のグラフは現在の能力値を
・能力値の値に赤字でMAXと装飾がされている場合は
成長限界に達している
ことを
・能力値の値に緑字でMAXと装飾がされている場合は
能力の最大値に達していること
を
示すものとなっている。
成長限界に達した場合は、
その段階ではそれ以上能力を成長させることはできない。
上限は時期を進めることで次第に解放されていく仕様となっている。
成長ピーク時期に近づくにつれて、成長させることのできる割合は増えていき、
成長ピーク時期に達した後は100%まで調教を進めることができる。
⚠
重要な点として、成長ピーク時期を超えた後は、
徐々に能力が減衰していく。
調教でいくらか、能力値が100%近い時期を維持することができるが、1年以上それをキープするためには
かなりの調教アイテムが必要となる。

調教アイテムの使用について

調教画面では、
調教アイテム
使用可能になっている。
各調教ごとに用意されており、Lvは1~3まで存在している。
Lv1は調教効果を+50%、Lv2は調教効果を+100%、Lv3は調教効果を+200%
するものになっている。
調教アイテムの入手方法
調教アイテムは
①ショップや交換所で無償ゲーム内通貨を使用しての購入
②NPCレース（ユニスタレース）への出走での入手
③抽選権の報酬として入手
の三通りの入手方法が存在している。
育成を進めていくとどうしても足りないアイテムになってくるので
①のショップで購入は頻繁に利用することになる。
SメダルやUSPは育成を進めると自然にたまるので、
育成アイテムが不足した場合は購入して問題ない。
また、
調教アイテムは③抽選権の報酬として入手可能
になっている。
貴重なLv3アイテムが手に入る機会にもなっている
ので、育成を進めて抽選権を獲得していこう！

オート調教について

オート調教はアイテムの使用有無を含めて設定することで、自動で調教を進めてくれる便利な機能になっている。
判明している限りで以下の使用が存在している。
・調教は週をめくったタイミングで実行される。
・成長限界値に比べて
一番低いステータスを調教します。
・馬体重が
適正軽め以下の場合は必ず放牧になる
・成長限界に近づくと、
アイテム使用を設定している場合でも使用せず調教が実行される。

メモリー登録について

所有している現役馬を
メモリー登録することで、オンラインレースに出走することが可能です。
メモリー馬はレース馬をメモリー登録したタイミングの能力を記録したオンラインレース出走用のセーブデータで
メモリーの登録はいつでも実施可能、また上書き保存も可能です。
メモリー登録を行うには無償USPもしくは有償USPが必要となり、
さらに有償USPを使用する事でメモリー馬の使用回数を購入することも可能な場合があります。
※使用回数の購入には上限があります。
レース馬のベストタイミングで登録しオンラインレースに出走しましょう。
オンラインレース出走数は1頭の競走馬で共通となり、上書きしても減少した出走数は回復できませんので注意しましょう。
メモリー登録の方法については、
レースからメモリー登録を選択し、登録したい競走馬を選択すると、
上記の画面が表示されるので、OKを押せば登録できます。
オンラインレースへの出走

オンラインレースにはスタリオンレースとユニバーサルレースが存在し、メモリー登録した競走馬を出走させることができる。
スタリオンレースでは
ガチャチケットやゲーム内通貨であるSメダル
が、
ユニバーサルレースでは
Uソウルや最高レアリティのLR繁殖馬が排出対象になっているSPガチャチケット
が
入手可能になっている。
ともにすべてのプレイヤーが参加可能なため、難易度は非常に高い
しかし、レアリティ限定戦があり、初心者でも入着のチャンスがあるので積極的に参加していきたい。
Point!
・ユニバーサルレースは
最難関!
勝てそうにない馬はスタリオンレースに出走させよう!
・協賛レースイベント開催中は
エントリーした全プレイヤーがUソウルをゲットできる。
こまめにイベント情報をチェックしてエントリーを忘れないようにしよう！

// ========== 状態管理 ==========
const API_KEY = 'AIzaSyD79ZhRTCp_SgsgXbruHiSOOYAb9Y71fEU'; // ← ここにGemini APIキーを貼り付けてください
let messages = [];
let isLoading = false;

// ========== UI操作 ==========


function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ========== チャット ==========
function addMessage(role, content) {
  const area = document.getElementById('chat-area');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🐎';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🐎';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addError(msg) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  if (!API_KEY || API_KEY === 'AIzaxxxxxxxxxxxxxxxx') {
    addError('APIキーが設定されていません。chatbot.htmlのAPI_KEY変数にGemini APIキーを入力してください。');
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    // Gemini APIフォーマットに変換
    const geminiMessages = messages.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: geminiMessages,
          generationConfig: { maxOutputTokens: 1024 }
        })
      }
    );

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      const errMsg = data.error?.message || `APIエラー (${res.status})`;
      addError(`エラー: ${errMsg}`);
      messages.pop();
    } else {
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '回答を取得できませんでした。';
      addMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    removeTyping();
    addError(`通信エラー: ${e.message}`);
    messages.pop();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
