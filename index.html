<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユニスタRE Wiki チャットボット</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c8922a;
      --gold-light: #e8c06a;
      --gold-dim: #b28c39;
      --bg: #1a1814;
      --bg2: #231f1a;
      --bg3: #2e2820;
      --border: #3a3228;
      --text: #e8e0d0;
      --text-dim: #9a8e7a;
      --accent: #e88c00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    /* チャットエリア */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ウェルカムメッセージ */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .welcome-icon {
      font-size: 2.5em;
      margin-bottom: 16px;
    }
    .welcome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4em;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .welcome p { font-size: 0.85em; line-height: 1.7; }
    .welcome-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .example-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78em;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
    }
    .example-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--bg2); }

    /* メッセージ */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 800px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .msg.assistant { margin-right: auto; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--gold); color: #1a1814; }
    .msg.assistant .msg-avatar { background: var(--bg3); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88em;
      line-height: 1.75;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--gold);
      color: #1a1814;
      font-weight: 500;
      border-radius: 8px 2px 8px 8px;
    }
    .msg.assistant .msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 2px 8px 8px 8px;
    }

    /* ローディング */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* 入力エリア */
    #input-area {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88em;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { outline: none; border-color: var(--gold); }
    #user-input::placeholder { color: var(--text-dim); }
    #send-btn {
      background: var(--gold);
      color: #1a1814;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* エラー */
    .error-msg {
      background: #3a1a1a;
      border: 1px solid #7a3030;
      color: #e08080;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82em;
    }

    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #chat-area { padding: 14px; }
      #input-area { padding: 10px 14px; }
      .msg { max-width: 100%; }
    }
  </style>
</head>

①
王者の歩み強し！

③
低レアリティはチャンスあり⁉
→URやLRは上位プレイヤーが順当に強さを見せた週になった。
一方で、RやHNは違ったプレイヤーが掲示板を占めることも多く、またそのメンツも毎回違っていた。
始めたばかりのプレイヤーでも
低レアリティは勝利のチャンスあり
といえるだろう！

①
エバヤン強し！
→エバヤン、およびエバヤン配合が持つスキルの強さが特にダートレースで目立った。
名馬スキルの「世界を制した日本代表」もテキスト通り強力。
今週はサウジカップですし、応援ガチャ回しましょう！
②
とあるスキル系統が強い
→二週継続してとある系統のスキルが強い環境が継続しているように思う
保持スキルやレース永続を見て確認してほしい。
※筆者にまだ確信がないので、ここはぼかしておきます
③
NFTが絡むスキルが強い
→NFTが絡むスキル持ちの競走馬も継続して多い。
やはり確定発動なのは強力かつスキル効果量も直近の調整で環境最上位なので、弱いわけがない。
こちらもガチャが登場しているので、一考の余地あり。

使用スキルでは

評価まとめ
シンボリルドルフは高ステータスの種牡馬。
初登場はシーズン1以前と最初期に登場した種牡馬になっている。
所持スキルのうち、勝負根性UP、重馬場巧者は現環境では使い道のないスキルとなっている。
また、交配においても、仮にLRが生まれる場合は、上記の2スキルを確定で継いでしまうため、
かなり使いずらい種牡馬となっている。
名馬配合にはトウカイナチュラルとの配合で実現できるトウカイテイオー再現馬が存在するが、
所持する名馬才能がラストスパート相当のものとなっており、こちらも現環境での優先度はかなり低いスキルとなっている。
まとめると、現環境では、うまく活用することが難しい種牡馬といえる。
LRであり、ステータスは高いので、うまく配合してLR馬を生産したいところ。

NPCレースについて
NPCレースはNPC（コンピューター）と対戦するレースです。
NPCレースはエントリー後にすぐに開催されるため、いつでも発走することができます。
NPCレースでは入賞時にUSPやSメダル、アイテム、ガチャチケット交換券など様々な賞品が獲得できます。
レースには参加条件を要求されるものもあり、参加条件のレーティングが高いものほど賞金額が高く、逆にレーティングが低いローカルレースは賞金額が低い傾向があります。

オンラインレースについて
オンラインレースはメモリーを用いて他のプレイヤーと対戦するレースです。
メモリーに関しては以下から「メモリー」の項目をご確認ください。
レースごとにエントリー期間が決められており、&color(#F54738){制限時間を過ぎた場合はそのレースに参加することはできません。}
オンラインレースには以下の種類があります
・&color(#F54738){ユニバーサルレース}：予選と本戦からなる1位となる1頭を決めるレースで、予選、本戦の1～9着は&color(#F54738){Uソウル}が獲得できるレースです。&color(#F54738){本線の1~3着が獲得できるUソウル量は多くなっています。}また、こちらのレースはエントリー数に上限があります。
・&color(#F54738){スタリオンレース}：1位となる1頭を決めるレースで、&color(#F54738){すべてのプレイヤーがSメダルやガチャチケットなどを着順に応じて獲得できる}レースです。こちらのレースはエントリー数に上限はありません。
・&color(#F54738){イベントレース}：非定期で開催される&color(#F54738){イベントオンラインレース}です。報酬やレースタイプなどはイベントによって様々で、&color(#F54738){多くのUソウルが報酬として設定されるケースが多い}です。
オンラインレースはエントリー後、開始時刻になれば自動的にレースが発走されます。
メモリー馬を出走させた場合は、&color(#F54738){レース後は結果画面からレースの映像が閲覧}できます。
また、出走させていないレースについても&color(#F54738){「オンラインレース観戦」}より閲覧可能となっています。
また出走させた場合は、ギフトより結果に応じた報酬を受け取ることができます。

ランキングについて
ランキングは&color(#F54738){ブリーダーズランキングとSメダルランキング}があります。
◆ブリーダーズランキングについて
ブリーダーズランキングは&color(#F54738){集計期間中に引退した馬のうち、レーティングポイントが高い上位の馬が対象}となります。
&color(#F54738){レーティングポイントはレースに出走させて勝利するなどで獲得することができます。}
また、同ポイントの場合は先着したほうが上位となります。
レースのグレードに高くなるとレーティングポイントも高くなるため、&color(#F54738){グレードの高いレースの制覇}を目指しましょう。
集計期間をまたがってレースを実施していても対象となるのは引退した時点となるため、
&color(#F54738){ランキングに参加させたい馬は引退するのを忘れないように注意しましょう。}
◆Sメダルランキングについて
Sメダルランキングは&color(#F54738){所有馬でレースに出た時等に獲得できるSメダル（スタリオンメダル）の合計を競うランキング}で、
&color(#F54738){SメダルはNPCレース、オンラインレース、マーケットの売買で獲得することができます。}
競走馬を育成してレースに勝利してSメダルを集めたり、繁殖馬をマーケットで販売して獲得したSメダルも対象となります。
&color(#F54738){マーケットの売買で増減したメダルは、合計がプラスとなっている分だけランキングに加算されます。}
&color(#F54738){ランキングに加算されるメダルはレースで獲得したメダルによって上限が決まっています。}
&color(#F54738){ランキングは開催期限が決まっており、開催期間内のみSメダルの獲得集計がされ期間終了後にその時点でのランキング報酬が付与されます。}
&color(#F54738){取得したSメダルはシーズン終了（3ヶ月）とともにリセットされます。}
開催中のランキングはゲーム内お知らせ及びランキングページにて確認することができます。
抽選会と抽選券について
毎日&color(#F54738){Uソウル（ユニバーサルソウル）、USP、アイテムが当たる抽選会が行われます。}
抽選に参加するにはNPCレースでJRAレースを勝つと確率で手に入る抽選券を入手することで参加が可能です。
どの条件でも入手可能となっていますが、&color(#F54738){入手確率が高いのG3以上}になり、
&color(#F54738){G3では勝利時に50%前後の確率で,G2では80%前後の確率で入手可能}と考えられます。
また、&color(#F54738){G1では勝利時に必ずG1抽選券が入手できます。}
こちらはG1でのみ入手可能な抽選券となっています。
抽選は毎日4：00頃に行われ、取得した翌日以降に&color(#F54738){抽選会場にて発表いたします。}
当選した賞品はプレゼントボックスに送られますので確認しましょう。
また、抽選券は当選状況にかかわらず当選発表日の翌日に削除となります。

## 交配のコツ、立ち回り
ユニスタREにおける交配のコツと立ち回りを掲載しています。
ユニスタREの交配の立ち回りやコツを詳しく紹介しているので、
交配に悩んでいる初心者の方はぜひ参考にしてください。
交配の概要
インブリードとは
ニックスとは
名馬配合とは
才能・パラメータの引継ぎについて

交配の概要
交配とは
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-214113_RE.jpg)
ユニスタREでは、
繁殖牝馬と種牡馬
を掛け合わせ、新たな仔馬を誕生させることができます。
交配用の繁殖馬は
ガチャから入手できる史実馬、自らで育成した自家生産馬
のいずれも使用可能となっています。
生産した仔馬は両親のパラメーターや才能を引き継ぎますが、
パラメータをきちんと引き継げるかどうかは確率によるものとなっています。
これから紹介する
インブリードやニックス、名馬配合
など多岐にわたる要素を活用して
あなただけの最強馬の育成を目指しましょう！
交配の流れについて
![ファイル名](https://img.atwiki.jp/unistare/pub/aScreenshot_20251117-211754_RE.jpg)![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-214011_RE.jpg)![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-211748_RE.jpg)
まずはホーム画面から交配を選択し、交配画面に移動しよう。
交配画面に移動すると、上に種牡馬、下に繁殖牝馬が表示される。
左右の矢印を選択することで、対象の馬を変更できる。
下の空白には
ニックスやインブリード、名馬配合
がある場合は表示される。
交配させる馬が決まったら、交配開始を選択して交配を行おう。
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251116-104355_RE.jpg)![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-214052_RE.jpg)![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-214059_RE.jpg)
交配後、馬一覧から、繁殖牝馬を選ぶと、先ほど選んだ馬の右上に、受胎中:hh:mm:ssの表示がついている。
これは
出産待機時間
と呼ばれるものであり、ユニスタREではこの時間が経過するまで、仔馬を出産させることができない。
この状態で繁殖牝馬を選択すると、スキップ確認メニューが表示され、
USPを消費した繁殖時間の短縮
が可能になっている。
また、
一日に一度だけ6時間短縮が無料で使用可能
になっている。
毎日交配を行ってこちらの無料短縮は余さず使おう！
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-220702_RE.jpg)![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-222600_RE.jpg)
出産待機時間が経過した後は、出産準備完了という表示に代わるので、こちらを選択して出産させよう！
インブリードとは
インブリードについて
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-223417_RE.jpg)
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251117-223421_RE.jpg)
ユニスタREでは各競走馬にインブリード因子が存在しています。
因子は
交配する両親の血統に同じ血統が存在する場合
活性化し、インブリード効果が発生します。
交配において発生するインブリード、そのインブリードが持つ因子は交配画面より確認が可能
になっており、〇〇:××ptの形式で表示されます。
活性化した場合は
各種パラメータ、育成タイプ、得意馬場タイプ
などに影響を与えます。
インブリードにはそれぞれ
因子（1〜32）があり、それぞれ、ステータスにバフ、デバフ
がかかります。
また、インブリード交配には血量が18.75ptになる、
”奇跡の血量”
と呼ばれる交配が存在します。
こちらはより良い交配結果を作り出すとされています。
ただしインブリードには注意点も存在します。
インブリードが発生した場合、生まれてくる仔馬の気性と安定性のパラメータに悪影響を及ぼしたり、NPC戦の出走可能回数が減少する
場合があります。
インブリードは基本的にはより良い競走馬を生産するために、有効な手段となっています。
積極的に活用して、名馬を生産しましょう！
インブリード因子の効果について
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251118-131511_RE.jpg)
インブリード因子（1〜32）の効果は交配開始を選択した画面及び、
公式サイトから確認可能になっている
交配画面で確認できる記号には◎▲▼×が存在し、意味はそれぞれ以下の通りとなっています。
※◎◎は大きく上昇
※◎は上昇
※▲は少し上昇
※▼は少し下降
※☓は下降
※☓☓は大きく下降
公式サイトから因子表を参照される場合は、以下のリンクからご参照ください。

ニックスとは
ニックスについて
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251118-132852_RE.jpg)![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251118-132858_RE.jpg)
ユニスタREでは配合する繁殖馬の父血統と母父血統の相性が良い時にニックス効果が発動します。
ニックスには、以下の通り様々な種類が存在しています。
ニックス
父と母父
の相性が良い状態
ダブルニックス
父と母父及び母母父
の相性が良い状態
トリプルニックス
父と母父、母母父、母母母父
の相性が良い状態
2次ニックス
父と母母父
の相性が良い状態
3次ニックス
父と母母母父
の相性が良い状態
ニックス効果は、インブリードと異なり、
パラメータへの影響が明らかにされていない
という特徴が存在します。
ただし、マイナスの影響を与えるものではなく、プラスの影響を与えるものであり、
パラメータの引継ぎに際して、安定性を底上げする効果のあるものではないかと筆者は考えています。
効果量についてはトリプルニックス>ダブルニックス>ニックスの順になると思われます。
ニックスとなる組み合わせ
ユニスタREでは様々な父、母の組み合わせでニックス効果が発生します。

才能・パラメータの引継ぎについて
パラメータの引継ぎについて
![ファイル名](https://img.atwiki.jp/unistare/pub/1000001846.jpg)
▲このように高安定の両親かつ、ニックスやインブリードを持つ配合は高確率で親のステータスを引き継げる。
ユニスタREでは基本的に生まれてくる仔馬は
両親のパラメータを引き継ぐ
仕様になっている。
引き継ぐ際の確率計算は明らかにされていないが、
両親の安定のパラメータ値
が高ければ高いほど、両親のステータスに近い仔馬が生まれてくると考えられる。
前段で紹介した
ニックスやインブリード
はこの確率計算、つまりステータスの計算に寄与すると考えられ、
いずれも結果を底上げする効果を持つと考えられる。
才能引継ぎについて
ユニスタREでは生まれてくる仔馬は名馬配合を除き、すべてのスキルを両親から引き継ぐ。
スキル引継ぎの際の確率計算は明らかにされていないが、これまでの情報から
・
必ず最高レベルのスキルのうち一つを引き継ぐ。
（Lv4のスキルが存在する場合はlv3を含めて一つ選ばれる）
・スキルの引継ぎ抽選は父の左上、母の左上、父の右上、母の右上という順に行われ、
上のほうにあるスキルのほうが引き継がれやすい
と考えられる。
・両親で重複するスキルを持ち、抽選によって、
そのどちらもが引き継ぎ対象になった場合、引き継がれるスキル数はその分だけ減少する。
（例.HRの馬が誕生する場合、スキルは6個持つはずだが、重複したスキルが一つある場合、スキル5個の仔馬が生まれる）
という特徴が存在する。

## 才能について
ユニスタREの重要な要素である才能についてまとめています。
強力な競走馬生産の参考にしてください。
才能について
才能構成の考え方
強力な才能の見つけ方
才能一覧
才能について
才能について
才能は&color(#F54738){レース中に特別な効果を発揮する能力}になります。
&color(#F54738){両親からそれぞれ最大4つずつ、最高で8つ}引き継ぐ事ができ、
最もLvが高い才能を1つだけ優先で引き継ぎます。
&color(#F54738){Lv2もしくはLv3が最大かつ複数所持していた場合は、ランダムで引き継ぎます。}
&color(#F54738){Lv3とLv4を複数所持していた場合は、両レベルの中から、ランダムで引き継ぎます。}
引き継いだ才能は1つのみ開花した状態で誕生しますが、
NPCレースに出走することで開花する可能性があり、勝利した場合は必ず開花します。
才能には各Lvがあり、&color(#F54738){Lvが高いほど効果が高くなります。}
&color(#F54738){Lvによる効果値は才能によってそれぞれ異なります。}
例：重馬場巧者Lv3より重馬場巧者・ダートLv3の方がデバフ軽減効果が高い
ガチャから手に入る種牡馬や繁殖牝馬は
&color(#F54738){レアリティが高いものほどより強く多くの才能を持つ傾向}があります。
【才能の効果期間について】
説明文中に&color(#F54738){特に効果期間について言及されていない場合、レースを通してずっと効果を発揮}します。
&color(#F54738){レース中に発動する記載があるものは、それぞれ効果が発揮される場所が異なります。}
それぞれ文中の区間構成は以下となっています。
・スタートから序盤：&color(#F54738){スタートしてから200m地点まで}
・残り3ハロン：&color(#F54738){ゴールまで残り600m}
・残り400m　：&color(#F54738){ゴールまで残り400m}
・残り200m　：&color(#F54738){ゴールまで残り200m}
・序盤：&color(#F54738){200m地点から残り3ハロンまでの範囲で3分割した、最初の1/3の区間}
・中盤：&color(#F54738){200m地点から残り3ハロンまでの範囲で3分割した、真ん中の2/3の区間}
・終盤：&color(#F54738){200m地点から残り3ハロンまでの範囲で3分割した、最後の3/3の区間}
例：
スタートから序盤までの速度が少しアップ（発動確率あり）
⇒&color(#F54738){スタートしてから200m地点まで効果発揮}
脚質が逃げの場合、序盤の速度が少しアップ
⇒&color(#F54738){効果範囲は序盤のみ}
中盤に入って先頭だった場合、終盤までの速度が少しアップ
⇒&color(#F54738){効果範囲は中盤から終盤}
【才能の一部効果紹介】
・適正UP：レース中&color(#F54738){常に効果を発揮し適性の不利}を打ち消します。
・パラメータUP：&color(#F54738){レース中常に効果を発揮し該当パラメータがUP}します
・レースパラメータUP：レース時に&color(#F54738){発動時は効果エフェクトが発生}、一定時間効果を発揮します。
発動条件の記載があるものは確率で発動します。
また、条件を満たしていない場合は発動しない場合があります。
才能構成の考え方
才能構成を考える上でのポイントは大きく三つ存在しています。
以下のポイントを考慮したうえで搭載するスキルを考えることが
強力な競走馬を生産する第一歩になります。
&color(#F54738){①強いと言われている才能を片っ端から入れれば強いと言う訳ではない}
&color(#F54738){②脚質によって、搭載したい才能は変わる}
&color(#F54738){③短距離の馬と長距離の馬では入れた方がよい才能は違う}
①強いと言われている才能を片っ端から入れれば強いと言う訳ではない
例えば、LRNFTの才能やLv4才能、電撃戦シリーズ、クラシックシリーズの才能を搭載した
良いステータスを持つ競走馬は&color(#F54738){NPCレースでは、適性外のレースも含めて、かなりのレースを勝利し、レーティングもかなり高い状態で引退できる}と考えられます。
しかし、このような競走馬をオンラインレースに出走させても&color(#F54738){勝ちきれない}ということが起こりえます。
勝ちきれる競走馬の生産には②③の要素を抑えることが必要になるかもしれません。
②脚質によって、搭載したい才能は変わる
まず才能構成で重要になってくるのは、脚質に合った才能かどうかです。
ユニスタREには、&color(#F54738){「目標速度」}と言うモノがあります。
これは、&color(#F54738){各脚質によって各区間における最大速度が決まっている}と言うものです。
※例として
逃げ・序盤の目標速度が一番高い
追込・終盤の目標速度が一番高い
※この目標速度の設定がなければ、追込なのに先頭集団にいるなどの現象が起きてしまうため
この仕様により、追込の馬が先手必勝4を発動した場合、その効果量は逃げ馬より劣ります。
逆に、逃げの馬で追い上げが発動した場合、その効果量は追込馬より劣ります。
この辺りも考慮しつつ、その馬に適した才能を載せているか、と言う部分も重要な要素となっています。
※脚質別の仕様については、以下からご確認ください。
▶脚質別の仕様はこちら
③短距離の馬と長距離の馬では入れた方がよい才能は違う
短距離と長距離のレースで重要なのは、単に距離が短い、長い、スタミナが不要、必要ではなく、
&color(#F54738){『レース中に各区間が占める割合』}と考えられます。
スタート（スタート〜200m）
残り3F以降の600m
を除く距離を3分割したものがそれぞれ、序盤、中盤、終盤となるため、それぞれの区間距離は
&color(#F54738){1200mの場合、133m}
&color(#F54738){2400mの場合、533m}
&color(#F54738){3200mの場合、800m}
となるため、長い距離であればあるほど、&color(#F54738){区間毎の才能が効果をより発揮し}、逆に短い距離であればあるほど、&color(#F54738){スタート、3F以降の才能がより効果を発揮出来る}と考えられます。
そのため、1600mまでが適正距離の馬と3200mまでが適正距離の馬では、載せたい才能が異なってくるのも分かると思います。
強力な才能の見つけ方
強力な才能の見つけ方
では強力な才能は一体どうやって見つければよいのでしょうか？
ユニスタREではその大きな助けになる要素として、
&color(#F54738){オンラインレースの観戦機能とレーティングptランキング機能}が存在しています。
オンラインレースの観戦
レースを観ることはとても重要な要素となっています。
すべてのレースを見ることは難しいかと思いますので、
まずは&color(#F54738){オンラインレースの映像}を見てみましょう。
オンラインレースの映像は宝の山です。ここに速い馬を作るための情報がたくさんあります。
&color(#F54738){レース映像には発動したスキルの一部と、そのスキルを発動した競走馬名が表示されています。}
スキルを発動した馬がどのような挙動をしているか、
他馬の動きと比較してどうか等確認してみましょう。
レースをスキップすることなく観ることで、&color(#F54738){才能発動時の挙動}、
&color(#F54738){ステータスバランスによる挙動}が分かってきます。
これによりどのスキルが強いのかも確認することができます。
レーティングptランキング機能
オンラインレースの観戦では一部のスキルしか確認することができませんが、
レーティングptランキングではその競走馬の
&color(#F54738){ステータス、脚質、スキルなどすべてが確認可能}になっています。
このランキングには、オンラインレースで1~3着に入着している競走馬がランクインしていることもあります。
このような競走馬の情報を欠かさず見ることができるように、ランキングの確認、レースの確認は欠かさないようにしましょう。

## 競走馬の基本
ユニスタREの競走馬に関する基本情報をまとめました。
レアリティの考え方など記載していますので、参考にしてください。
レアリティと強さについて
パラメータについて
才能について
脚質について

時間進行と馬齢
引退
レアリティと強さについて
競走馬や種牡馬、繁殖牝馬にはレアリティがあり
LR　レジェンドレア
UR　ウルトラレア
HR　ハイレア
R　　レア
HN　ハイノーマル
N 　 ノーマル
と6段階が存在しています。
レアリティが高いほど&color(#F54738){パラメータの限界値や初期値が高く、}
&color(#F54738){貴重なスキルを持っている傾向にあります}
レアリティが低い馬からでも、&color(#F54738){交配の組み合わせによっては名馬が誕生する可能性}もあります。
▶名馬配合の詳細はこちら
パラメータについて
各馬は&color(#F54738){スピード/スタミナ/勝負根性/気性/安定性}の5種類のパラメータを所持しています。
各パラメータは以下の意味を持っています。
スピード：その馬が持つ&color(#F54738){最高速度に大きく影響し、 高いほどより速く走れます。}
スタミナ：その馬の&color(#F54738){総エネルギーに大きく影響し、レース中にエネルギーが尽きると馬本来の速度が出せなくなります。}
スタミナの値が高いほど&color(#F54738){より長い距離を走り抜ける事が可能で、}
&color(#F54738){終盤のスパートでも力を発揮しやすくなります。}
勝負根性：&color(#F54738){加速に大きく影響し、馬の持つ最高速度、総エネルギーや終盤のスパートにも影響します。}
気性：&color(#F54738){スタートの好悪、掛かりの発生、脚質変更の発生に大きく影響します。}
また、道中のレースパフォーマンスに少し影響があります。
&color(#F54738){数値が高いほど走りが安定する傾向があります。}
安定性：&color(#F54738){交配時に影響するステータスです。}
安定性が高いほど生まれてくる仔馬のステータスが平均して高い傾向があります。
&color(#F54738){安定性が低いほど両親のステータスとは無縁の突然変異が発生しやすくなります。}
突然変異で誕生した馬は&color(#F54738){例えレアリティが高くとも一部のパラメータが著しく低い場合もあり活躍しづらいかもしれません。}
また、パラメータには&color(#F54738){限界値と成長限界値}が存在しています。
限界値は持って生まれた&color(#F54738){その馬のパラメータの最終的な限界値}となります。
成長限界値は馬の成長タイプに沿って、&color(#F54738){馬齢に応じて増減する育成できる上限の値}です。
限界値に達したパラメータは&color(#F54738){ステータスの表記が緑のMAX表記となります。}
成長限界値に達したパラメータは&color(#F54738){ステータスの表記が赤のMAX表記となります。}
ピークを過ぎた馬は成長限界値の他、&color(#F54738){衰えの為ステータスが減衰していってしまうのでレース出走や引退のタイミングを見定める必要があります。}
▶競走馬育成のコツはこちら
才能について
才能は&color(#F54738){レース中に特別な効果を発揮する能力}になります。
&color(#F54738){両親からそれぞれ最大4つずつ、最高で8つ}引き継ぐ事ができ、
最もLvが高い才能を1つだけ優先で引き継ぎます。
&color(#F54738){Lv2もしくはLv3が最大かつ複数所持していた場合は、ランダムで引き継ぎます。}
&color(#F54738){Lv3とLv4を複数所持していた場合は、両レベルの中から、ランダムで引き継ぎます。}
引き継いだ才能は1つのみ開花した状態で誕生しますが、
NPCレースに出走することで開花する可能性があり、勝利した場合は必ず開花します。
才能には各Lvがあり、&color(#F54738){Lvが高いほど効果が高くなります。}
&color(#F54738){Lvによる効果値は才能によってそれぞれ異なります。}
例：重馬場巧者Lv3より重馬場巧者・ダートLv3の方がデバフ軽減効果が高い
ガチャから手に入る種牡馬や繁殖牝馬は
&color(#F54738){レアリティが高いものほどより強く多くの才能を持つ傾向}があります。
【才能の効果期間について】
説明文中に&color(#F54738){特に効果期間について言及されていない場合、レースを通してずっと効果を発揮}します。
&color(#F54738){レース中に発動する記載があるものは、それぞれ効果が発揮される場所が異なります。}
それぞれ文中の区間構成は以下となっています。
・スタートから序盤：&color(#F54738){スタートしてから200m地点まで}
・残り3ハロン：&color(#F54738){ゴールまで残り600m}
・残り400m　：&color(#F54738){ゴールまで残り400m}
・残り200m　：&color(#F54738){ゴールまで残り200m}
・序盤：&color(#F54738){200m地点から残り3ハロンまでの範囲で3分割した、最初の1/3の区間}
・中盤：&color(#F54738){200m地点から残り3ハロンまでの範囲で3分割した、真ん中の2/3の区間}
・終盤：&color(#F54738){200m地点から残り3ハロンまでの範囲で3分割した、最後の3/3の区間}
例：
スタートから序盤までの速度が少しアップ（発動確率あり）
⇒&color(#F54738){スタートしてから200m地点まで効果発揮}
脚質が逃げの場合、序盤の速度が少しアップ
⇒&color(#F54738){効果範囲は序盤のみ}
中盤に入って先頭だった場合、終盤までの速度が少しアップ
⇒&color(#F54738){効果範囲は中盤から終盤}
【才能の一部効果紹介】
・適正UP：レース中&color(#F54738){常に効果を発揮し適性の不利}を打ち消します。
・パラメータUP：&color(#F54738){レース中常に効果を発揮し該当パラメータがUP}します
・レースパラメータUP：レース時に&color(#F54738){発動時は効果エフェクトが発生}、一定時間効果を発揮します。
発動条件の記載があるものは確率で発動します。
また、条件を満たしていない場合は発動しない場合があります。
脚質について
脚質は&color(#F54738){その競走馬が得意とするレース運び}です。
全ての馬は脚質毎にパラメータを持っており、
&color(#F54738){一番強い脚質がその馬の脚質として馬の詳細に表示}されています。
脚質のパラメータの値はレース内の速度に影響し、
&color(#F54738){脚質が変わってしまうと、得意脚質が1つしかなかった場合は}
&color(#F54738){本来の強さを発揮できなくなるなどの弊害が起こりえるので、}
&color(#F54738){ジョッキーをレンタルする}ことで発生率を減少させることも可能です。
ジョッキーにはそれぞれ得意な脚質があり、
&color(#F54738){自分の馬にあったジョッキーを選んで騎乗させましょう。}
レースでは馬の気性に準じた確率で&color(#F54738){脚質変更}が発生する場合もあります。
脚質には下記の種類と特徴があります。
逃げ：&color(#F54738){序盤から中盤にかけて先頭を目指し、終盤ではスタミナが続く限り加速し続けます。}
先行：&color(#F54738){序盤から中盤にかけてスタミナを温存しつつトップ集団を目指し、終盤でスパートをかけます。}
差し：&color(#F54738){中盤まではある程度の加速に止めスタミナを温存し、終盤に一気に距離を詰めます。}
追い込み：&color(#F54738){中盤まではスタミナを温存し、終盤で1位を目指して最高速度で駆け上がります。}
入厩について
交配やNFTをインポートした仔馬は&color(#F54738){未入厩馬}として所有します。
未入厩馬は入厩をすることでレース馬として使用することが可能です。
&color(#F54738){入厩はマイページの入厩、もしくは馬一覧の未入厩馬一覧}から選択することで実行することが可能です
入厩したタイミングから時間進行によって馬齢が増加していくので注意が必要です
また&color(#F54738){入厩にはHPを使用し、消費するHPは入厩する馬の成長タイプによって異なります。}
成長に時間がかかる晩成の馬ほど入厩時にかかるHP消費量は低く、反対に早めに活躍ができる早熟馬は入厩時にかかるHP消費が高くなります。
入厩ができるのは&color(#F54738){1月1週～1月4週までとなっており、入厩時の馬齢は必ず2歳から開始します。}
入厩時のHPの消費量について

時間進行と馬齢
入厩した馬は時間進行によって加齢していきます
時間の進行はカレンダーから1週ずつ進行することが可能です。
加齢のタイミングは毎年1月1週になった時点ですべてのレース馬が＋1歳加算されます
レース馬が1頭も居ない場合で、カレンダーが1月1週でない場合には、1月1週まで時間を進行する事が可能です。
反対に1月1週でレース馬がいない場合はカレンダーを進行することは出来ません。
引退
競走馬には&color(#F54738){出場できるレースの上限回数が決まっており、上限に達した馬は引退}となります。
また上限回数に満たない状態でも途中で引退させることもできます。
&color(#F54738){馬の詳細画面の「引退ボタン」から、引退と同時に繁殖権利を取得するか交配に使用することができるアイテムと交換するかを選択することができます。}
&color(#F54738){繁殖権利の場合は引退する馬の競走成績やレアリティに応じた追加購入できる繁殖権利}が付与されます。繁殖権利の上限はそれぞれ違います。
&color(#F54738){交配権チケットは引退させた馬と同じレアリティの繁殖馬の交配回数を増やすことができるアイテム}となります。
引退すると馬のパラメータがその馬の潜在能力（限界値）の値である緑のMAX表記で表示されます。
詳しくは「交配」のページをご参照下さい。
また、繁殖牝馬や種牡馬権利は&color(#F54738){マーケットで販売することも可能}です。

メモリー登録について
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251115-215306_RE.jpg)
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251115-215312_RE.jpg)
所有している現役馬を
メモリー登録することで、オンラインレースに出走することが可能です。
メモリー馬はレース馬をメモリー登録したタイミングの能力を記録したオンラインレース出走用のセーブデータで
メモリーの登録はいつでも実施可能、また上書き保存も可能です。
メモリー登録を行うには無償USPもしくは有償USPが必要となり、
さらに有償USPを使用する事でメモリー馬の使用回数を購入することも可能な場合があります。
※使用回数の購入には上限があります。
レース馬のベストタイミングで登録しオンラインレースに出走しましょう。
オンラインレース出走数は1頭の競走馬で共通となり、上書きしても減少した出走数は回復できませんので注意しましょう。
メモリー登録の方法については、
レースからメモリー登録を選択し、登録したい競走馬を選択すると、
上記の画面が表示されるので、OKを押せば登録できます。
オンラインレースへの出走
![ファイル名](https://img.atwiki.jp/unistare/pub/Screenshot_20251115-220428_RE.jpg)
オンラインレースにはスタリオンレースとユニバーサルレースが存在し、メモリー登録した競走馬を出走させることができる。
スタリオンレースでは
ガチャチケットやゲーム内通貨であるSメダル
が、
ユニバーサルレースでは
Uソウルや最高レアリティのLR繁殖馬が排出対象になっているSPガチャチケット
が
入手可能になっている。
ともにすべてのプレイヤーが参加可能なため、難易度は非常に高い
しかし、レアリティ限定戦があり、初心者でも入着のチャンスがあるので積極的に参加していきたい。
Point!
・ユニバーサルレースは
最難関!
勝てそうにない馬はスタリオンレースに出走させよう!
・協賛レースイベント開催中は
エントリーした全プレイヤーがUソウルをゲットできる。
こまめにイベント情報をチェックしてエントリーを忘れないようにしよう！

// ========== 状態管理 ==========
const WORKER_URL = 'https://gentle-scene-db92.applecake0612.workers.dev';
let messages = [];
let isLoading = false;

// ========== UI操作 ==========


function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ========== チャット ==========
function addMessage(role, content) {
  const area = document.getElementById('chat-area');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🐎';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🐎';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addError(msg) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    // Gemini APIフォーマットに変換
    const geminiMessages = messages.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: `今日の日付は${new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'long'})}です。この日付を基準にガチャや期間限定イベントの開催中・終了を正確に判断してください。\n\n` + SYSTEM_PROMPT }] },
        contents: geminiMessages,
        generationConfig: { maxOutputTokens: 4096 }
      })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      const errMsg = data.error?.message || `APIエラー (${res.status})`;
      addError(`エラー: ${errMsg}`);
      messages.pop();
    } else {
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '回答を取得できませんでした。';
      addMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    removeTyping();
    addError(`通信エラー: ${e.message}`);
    messages.pop();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
