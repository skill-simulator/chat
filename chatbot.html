<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --gold: #c8922a;
      --gold-light: #e8c06a;
      --gold-dim: #b28c39;
      --bg: #1a1814;
      --bg2: #231f1a;
      --bg3: #2e2820;
      --border: #3a3228;
      --text: #e8e0d0;
      --text-dim: #9a8e7a;
      --accent: #e88c00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      flex-shrink: 0;
    }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3em;
      letter-spacing: 0.1em;
      color: var(--gold);
    }
    .header-sub {
      font-size: 0.7em;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .header-right {
      margin-left: auto;
    }
    #api-key-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.75em;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
    }
    #api-key-btn:hover { border-color: var(--gold); color: var(--gold); }
    #api-key-btn.set { border-color: #4a9; color: #4a9; }

    /* APIキー入力エリア */
    #api-key-area {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: none;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    #api-key-area.open { display: flex; }
    #api-key-area label { font-size: 0.8em; color: var(--text-dim); white-space: nowrap; }
    #api-key-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: monospace;
    }
    #api-key-input:focus { outline: none; border-color: var(--gold); }
    #api-key-save {
      background: var(--gold);
      color: #1a1814;
      border: none;
      padding: 7px 16px;
      border-radius: 4px;
      font-size: 0.82em;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: opacity 0.15s;
    }
    #api-key-save:hover { opacity: 0.85; }

    /* チャットエリア */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ウェルカムメッセージ */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .welcome-icon {
      font-size: 2.5em;
      margin-bottom: 16px;
    }
    .welcome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4em;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .welcome p { font-size: 0.85em; line-height: 1.7; }
    .welcome-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .example-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78em;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
    }
    .example-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--bg2); }

    /* メッセージ */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 800px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .msg.assistant { margin-right: auto; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--gold); color: #1a1814; }
    .msg.assistant .msg-avatar { background: var(--bg3); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88em;
      line-height: 1.75;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--gold);
      color: #1a1814;
      font-weight: 500;
      border-radius: 8px 2px 8px 8px;
    }
    .msg.assistant .msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 2px 8px 8px 8px;
    }

    /* ローディング */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* 入力エリア */
    #input-area {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88em;
      font-family: 'Noto Sans JP', sans-serif;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { outline: none; border-color: var(--gold); }
    #user-input::placeholder { color: var(--text-dim); }
    #send-btn {
      background: var(--gold);
      color: #1a1814;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* エラー */
    .error-msg {
      background: #3a1a1a;
      border: 1px solid #7a3030;
      color: #e08080;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82em;
    }

    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #chat-area { padding: 14px; }
      #input-area { padding: 10px 14px; }
      .msg { max-width: 100%; }
    }
  </style>
</head>

// ========== 状態管理 ==========
let apiKey = localStorage.getItem('unistare_api_key') || '';
let messages = [];
let isLoading = false;

// 初期化
window.onload = () => {
  if (apiKey) {
    document.getElementById('api-key-btn').textContent = '🔑 APIキー設定済';
    document.getElementById('api-key-btn').classList.add('set');
    document.getElementById('api-key-input').value = apiKey;
  }
};

// ========== UI操作 ==========
function toggleApiKey() {
  const area = document.getElementById('api-key-area');
  area.classList.toggle('open');
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('unistare_api_key', val);
  const btn = document.getElementById('api-key-btn');
  btn.textContent = '🔑 APIキー設定済';
  btn.classList.add('set');
  document.getElementById('api-key-area').classList.remove('open');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ========== チャット ==========
function addMessage(role, content) {
  const area = document.getElementById('chat-area');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🐎';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🐎';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addError(msg) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey) {
    toggleApiKey();
    document.getElementById('api-key-input').focus();
    addError('APIキーを設定してください。右上の「🔑 APIキー設定」から入力できます。');
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      const errMsg = data.error?.message || `APIエラー (${res.status})`;
      addError(`エラー: ${errMsg}`);
      messages.pop();
    } else {
      const reply = data.content[0].text;
      addMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    removeTyping();
    addError(`通信エラー: ${e.message}`);
    messages.pop();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}
</script>
